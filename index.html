<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kế Hoạch Cá Nhân</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #fefce8 0%, #fef08a 100%);
            min-height: 100vh;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23fbbf24' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            background-size: 80px 80px;
        }
        
        .container { max-width: 1100px; }
        
        .day-header {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
            transition: all 0.3s;
        }
        
        .today .day-header {
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4) !important;
        }
        
        .today-highlight {
            border: 3px solid #ef4444;
            box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.2);
            background-color: rgba(254, 226, 226, 0.7);
        }
        
        .task-card {
            transition: all 0.2s ease;
        }
        
        .task-card:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        
        .calendar-grid {
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 10px;
        }
        
        .add-btn {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        
        .add-btn:hover {
            background: linear-gradient(135deg, #059669, #047857);
        }
        
        .file-preview img {
            max-width: 80px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        
        .file-icon { font-size: 2.5rem; color: #6b7280; }
    </style>
</head>
<body class="text-slate-800">

    <div class="container mx-auto px-3 py-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6 bg-white/80 backdrop-blur-sm rounded-2xl shadow-lg px-6 py-4">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 text-white px-5 py-2.5 rounded-xl flex items-center gap-2.5 text-base font-semibold shadow-md">
                    <i class="fa-solid fa-calendar-day text-lg"></i>
                    <span id="current-week-display" class="font-mono">23/03</span>
                </div>
                <button onclick="goToCurrentWeek()" 
                        class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition-all active:scale-95">
                    <i class="fa-solid fa-house"></i> Hiện tại
                </button>
            </div>
            <div class="flex gap-2">
                <button onclick="prevWeek()" class="w-10 h-10 flex items-center justify-center bg-white hover:bg-amber-50 border border-amber-200 rounded-xl text-xl shadow-sm transition-all active:scale-95">←</button>
                <button onclick="nextWeek()" class="w-10 h-10 flex items-center justify-center bg-white hover:bg-amber-50 border border-amber-200 rounded-xl text-xl shadow-sm transition-all active:scale-95">→</button>
            </div>
        </div>

        <!-- Grid 7 ngày -->
        <div id="calendar-grid" class="calendar-grid"></div>
    </div>

    <!-- Modal thêm task -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden">
            <div class="px-6 py-4 border-b flex items-center justify-between bg-amber-50">
                <h3 class="text-lg font-semibold text-amber-900">Thêm việc cần làm</h3>
                <button onclick="closeModal()" class="text-2xl text-amber-700 hover:text-amber-900">×</button>
            </div>
            
            <div class="p-6 space-y-5">
                <input id="task-input" type="text" class="w-full px-4 py-3 border border-amber-200 rounded-xl focus:border-amber-500 focus:ring-2 focus:ring-amber-200" placeholder="Nhập việc cần làm...">
                
                <div>
                    <label class="block text-sm font-medium text-amber-800 mb-1">Màu thẻ</label>
                    <input id="color-picker" type="color" value="#fbbf24" class="w-12 h-12 rounded cursor-pointer border border-amber-300">
                </div>

                <div>
                    <label class="block text-sm font-medium text-amber-800 mb-1">Đính kèm file (ảnh/PDF/...)</label>
                    <input id="file-input" type="file" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-amber-100 file:text-amber-700 hover:file:bg-amber-200">
                    <div id="file-preview" class="mt-3 flex items-center gap-3"></div>
                </div>
            </div>
            
            <div class="bg-amber-50 px-6 py-4 flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 text-amber-800 rounded-xl hover:bg-amber-100 text-sm">Hủy</button>
                <button onclick="addTaskWithFile()" class="flex-1 py-3 bg-amber-600 hover:bg-amber-700 text-white rounded-xl text-sm font-semibold">Thêm</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 right-6 bg-green-600 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 z-50">
        <i class="fa-solid fa-check-circle text-xl"></i>
        <span id="toast-text"></span>
    </div>

    <!-- Firebase SDK -->

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, remove } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";

    const firebaseConfig = {
  apiKey: "AIzaSyDIBOtL0A4OAIseC962Kva9E0AKO-kS3p4",
  authDomain: "kehoachhoctap-367f2.firebaseapp.com",
  databaseURL: "https://kehoachhoctap-367f2-default-rtdb.firebaseio.com",
  projectId: "kehoachhoctap-367f2",
  storageBucket: "kehoachhoctap-367f2.firebasestorage.app",
  messagingSenderId: "479477220164",
  appId: "1:479477220164:web:eb1c378ac4a47179544d11",
  measurementId: "G-JHP22QBLFQ"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);

    let currentMonday = new Date();
    let selectedDateForAdd = null;
    let selectedFile = null;
    let tasks = {};

    const dayNamesVN = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];

    function formatDateKey(date) { return date.toISOString().split('T')[0]; }
    function formatDisplayDate(date) { return date.toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit'}); }
    function getDayNameVN(date) { return dayNamesVN[date.getDay()]; }
    function getMonday(date) {
        const d = new Date(date);
        const day = d.getDay();
        d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
        return d;
    }

    function loadTasks() {
        onValue(ref(db, 'tasks'), (snap) => {
            const newTasks = snap.val() || {};
            if (JSON.stringify(newTasks) !== JSON.stringify(tasks)) {
                tasks = newTasks;
                renderWeek();
            }
        });
    }

    function renderWeek() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const monday = getMonday(currentMonday);
        const todayStr = formatDateKey(new Date());

        for (let i = 0; i < 7; i++) {
            const dayDate = new Date(monday);
            dayDate.setDate(monday.getDate() + i);
            const dateKey = formatDateKey(dayDate);
            const isToday = dateKey === todayStr;

            const dayDiv = document.createElement('div');
            dayDiv.className = `bg-white/90 backdrop-blur-sm rounded-2xl shadow-md overflow-hidden flex flex-col h-full ${isToday ? 'today-highlight today' : ''}`;

            dayDiv.innerHTML = `
                <div class="day-header text-white p-3 text-center">
                    <div class="text-xs font-medium tracking-wide opacity-90">${getDayNameVN(dayDate)}</div>
                    <div class="text-2xl font-bold">${formatDisplayDate(dayDate)}</div>
                </div>
                <div class="flex-1 p-3 space-y-2 overflow-y-auto max-h-[380px]" id="tasks-${dateKey}"></div>
                <div class="p-3 border-t border-amber-100">
                    <button onclick="window.showAddModal('${dateKey}')" 
                            class="add-btn w-full h-10 rounded-xl text-white font-medium flex items-center justify-center gap-2 shadow-md transition-all active:scale-95 text-sm">
                        <i class="fa-solid fa-plus"></i> Thêm
                    </button>
                </div>
            `;
            grid.appendChild(dayDiv);
            renderDayTasks(dateKey, tasks[dateKey] || []);
        }

        document.getElementById('current-week-display').textContent = formatDisplayDate(monday);
    }

        function renderDayTasks(dateKey, dayTasks) {
            const cont = document.getElementById(`tasks-${dateKey}`);
            cont.innerHTML = dayTasks.length ? '' : `
                <div class="flex flex-col items-center justify-center h-32 text-amber-400 text-xs">
                    <i class="fa-solid fa-list-check text-4xl mb-2 opacity-40"></i>
                    <p>Trống</p>
                </div>`;

            dayTasks.forEach(task => {
                const div = document.createElement('div');
                div.className = `task-card flex items-start gap-3 p-2.5 rounded-xl border-l-4 bg-opacity-10`;
                div.style.borderLeftColor = task.color;
                div.style.backgroundColor = task.color + '15';

                let fileHtml = '';
                if (task.fileUrl) {
                    if (task.fileUrl.match(/\.(jpg|jpeg|png|gif)$/i)) {
                        fileHtml = `<div class="mt-2"><img src="${task.fileUrl}" class="max-w-[90px] rounded shadow-sm" alt="Attachment"></div>`;
                    } else {
                        fileHtml = `<div class="mt-2 flex items-center gap-2 text-sm text-slate-600">
                            <i class="fa-solid fa-file text-2xl text-amber-600"></i>
                            <a href="${task.fileUrl}" target="_blank" class="hover:underline truncate max-w-[140px]">${task.fileName || 'Tệp đính kèm'}</a>
                        </div>`;
                    }
                }

                div.innerHTML = `
                    <input type="checkbox" class="w-4 h-4 accent-green-600 mt-1 cursor-pointer" ${task.done ? 'checked' : ''} onchange="toggleDone('${dateKey}', '${task.id}')">
                    <div class="flex-1">
                        <div class="text-sm ${task.done ? 'line-through text-slate-400' : 'text-slate-800'} font-medium">${task.text}</div>
                        ${fileHtml}
                    </div>
                    <button onclick="deleteTask('${dateKey}', '${task.id}')" class="text-red-400 hover:text-red-600 mt-1">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;
                cont.appendChild(div);
            });
        }

        function showAddModal(dateKey) {
            selectedDateForAdd = dateKey;
            selectedFile = null;
            document.getElementById('add-modal').classList.remove('hidden');
            document.getElementById('task-input').value = '';
            document.getElementById('file-preview').innerHTML = '';
            document.getElementById('task-input').focus();

            const colors = ['#fbbf24','#22c55e','#3b82f6','#a855f7','#ec4899','#f97316'];
            document.getElementById('color-picker').value = colors[Math.floor(Math.random()*colors.length)];
        }

        function closeModal() {
            document.getElementById('add-modal').classList.add('hidden');
        }

        document.getElementById('file-input').addEventListener('change', e => {
            selectedFile = e.target.files[0];
            const preview = document.getElementById('file-preview');
            preview.innerHTML = '';

            if (selectedFile) {
                if (selectedFile.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(selectedFile);
                    img.className = 'max-w-[80px] rounded';
                    preview.appendChild(img);
                } else {
                    preview.innerHTML = `<div class="flex items-center gap-2 text-sm text-slate-600">
                        <i class="fa-solid fa-file text-2xl text-amber-600"></i>
                        <span class="truncate max-w-[180px]">${selectedFile.name}</span>
                    </div>`;
                }
            }
        });

        async function addTaskWithFile() {
            const text = document.getElementById('task-input').value.trim();
            if (!text) return alert("Nhập nội dung việc!");

            const color = document.getElementById('color-picker').value;
            let fileUrl = null;
            let fileName = null;

            if (selectedFile) {
                if (selectedFile.size > 5 * 1024 * 1024) {
                    alert("File quá lớn! Chỉ hỗ trợ dưới 5MB.");
                    return;
                }
                try {
                    const path = `attachments/${Date.now()}_${selectedFile.name}`;
                    const fileRef = sRef(storage, path);
                    await uploadBytesResumable(fileRef, selectedFile);
                    fileUrl = await getDownloadURL(fileRef);
                    fileName = selectedFile.name;
                } catch (err) {
                    console.error(err);
                    alert("Upload file thất bại: " + err.message);
                    return;
                }
            }

            const newRef = push(ref(db, `tasks/${selectedDateForAdd}`));
            await set(newRef, {
                id: newRef.key,
                text,
                done: false,
                color,
                fileUrl,
                fileName,
                createdAt: Date.now()
            });

            closeModal();
            showToast("Đã thêm việc!");
        }

        function toggleDone(dateKey, taskId) {
            const taskRef = ref(db, `tasks/${dateKey}/${taskId}`);
            const task = (tasks[dateKey] || []).find(t => t.id === taskId);
            if (task) set(taskRef, { ...task, done: !task.done });
        }

        function deleteTask(dateKey, taskId) {
            if (confirm("Xóa việc này?")) {
                remove(ref(db, `tasks/${dateKey}/${taskId}`));
                showToast('Đã xóa');
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').textContent = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        }

        function prevWeek() { currentMonday.setDate(currentMonday.getDate() - 7); renderWeek(); }
        function nextWeek() { currentMonday.setDate(currentMonday.getDate() + 7); renderWeek(); }
        function goToCurrentWeek() { currentMonday = getMonday(new Date()); renderWeek(); }

        window.showAddModal = function(dateKey) {
        selectedDateForAdd = dateKey;
        selectedFile = null;
        document.getElementById('add-modal').classList.remove('hidden');
        document.getElementById('task-input').value = '';
        document.getElementById('file-preview').innerHTML = '';
        document.getElementById('task-input').focus();

        const colors = ['#fbbf24','#22c55e','#3b82f6','#a855f7','#ec4899','#f97316'];
        document.getElementById('color-picker').value = colors[Math.floor(Math.random()*colors.length)];
    };

    window.closeModal = function() {
        document.getElementById('add-modal').classList.add('hidden');
    };

    window.addTaskWithFile = async function() {
        const text = document.getElementById('task-input').value.trim();
        if (!text) return alert("Nhập nội dung việc!");

        const color = document.getElementById('color-picker').value;
        let fileUrl = null;
        let fileName = null;

        if (selectedFile) {
            if (selectedFile.size > 5 * 1024 * 1024) {
                alert("File quá lớn! Chỉ hỗ trợ dưới 5MB.");
                return;
            }
            try {
                const path = `attachments/${Date.now()}_${selectedFile.name}`;
                const fileRef = sRef(storage, path);
                await uploadBytesResumable(fileRef, selectedFile);
                fileUrl = await getDownloadURL(fileRef);
                fileName = selectedFile.name;
            } catch (err) {
                console.error(err);
                alert("Upload file thất bại: " + err.message);
                return;
            }
        }

        const newRef = push(ref(db, `tasks/${selectedDateForAdd}`));
        await set(newRef, {
            id: newRef.key,
            text,
            done: false,
            color,
            fileUrl,
            fileName,
            createdAt: Date.now()
        });

        window.closeModal();
        showToast("Đã thêm việc!");
    };

    window.toggleDone = function(dateKey, taskId) {
        const taskRef = ref(db, `tasks/${dateKey}/${taskId}`);
        const task = (tasks[dateKey] || []).find(t => t.id === taskId);
        if (task) set(taskRef, { ...task, done: !task.done });
    };

    window.deleteTask = function(dateKey, taskId) {
        if (confirm("Xóa việc này?")) {
            remove(ref(db, `tasks/${dateKey}/${taskId}`));
            showToast('Đã xóa');
        }
    };

    // Khởi tạo
    window.onload = () => {
        loadTasks();
        currentMonday = getMonday(new Date());
        renderWeek();
        document.addEventListener('keydown', e => { if (e.key === 'Escape') window.closeModal(); });
    };
    </script>
</body>
</html>
